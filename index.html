<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一般社団法人リズカーレ | THE LOCAL INNOVATION AGENCY</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Allerta+Stencil&family=Anton&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-black: #000000;
            --color-white: #FFFFFF;
            --color-gray: #333333;
            --color-red: #FF0000;
            --color-bg: #F0F0F0;
            --font-stencil: 'Allerta Stencil', sans-serif;
            --font-jp: 'Noto Sans JP', sans-serif;
            --border-thick: 5px solid var(--color-black);
        }

        body {
            margin: 0;
            font-family: var(--font-jp);
            background-color: var(--color-bg);
            background-image: url('https://www.transparenttextures.com/patterns/concrete-wall.png');
            color: var(--color-black);
            line-height: 1.6;
            overflow-x: hidden;
        }

        h1, h2, h3, h4 { margin: 0; }
        a { text-decoration: none; color: inherit; transition: 0.2s; }
        ul { list-style: none; padding: 0; margin: 0; }
        img { max-width: 100%; height: auto; transition: 0.5s ease; }

        .grayscale-art { filter: grayscale(100%) contrast(150%); }
        .hover-color:hover { filter: grayscale(0%) contrast(100%); }

        section { padding: 6rem 2rem; max-width: 1100px; margin: 0 auto; }
        .section-title {
            font-family: var(--font-stencil); font-size: 4.5rem; text-transform: uppercase;
            color: var(--color-black); margin-bottom: 3rem; text-align: center; letter-spacing: -2px; position: relative;
        }
        .section-title::after {
            content: ''; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 10px; background: var(--color-red); filter: blur(1px); opacity: 0.8;
        }

        header {
            position: sticky; top: 0; background: rgba(255, 255, 255, 0.95); border-bottom: var(--border-thick);
            display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 3rem; z-index: 1000;
        }
        .header-logo img { height: 60px; width: auto; display: block; mix-blend-mode: multiply; }
        nav ul { display: flex; gap: 2rem; font-weight: 900; align-items: center;}
        nav a:hover { color: var(--color-red); }
        .btn-contact-nav { background: var(--color-red); color: var(--color-white); border: var(--border-thick); padding: 0.5rem 1.2rem; font-weight: 900; text-transform: uppercase; transition: 0.2s;}
        .btn-contact-nav:hover { background: var(--color-black); }

        #vision { max-width: 100%; padding: 0; position: relative; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .hero-bg-art { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(150%) brightness(40%); }
        .vision-content { z-index: 10; text-align: center; max-width: 900px; padding: 0 2rem; color: var(--color-white); }
        .vision-title { font-family: var(--font-stencil); font-size: 5rem; line-height: 0.9; letter-spacing: -3px; text-shadow: 2px 2px 0 var(--color-black); }
        .vision-details { max-height: 0; overflow: hidden; transition: max-height 0.5s ease-out; }
        .vision-details.open { max-height: 1000px; }
        .vision-text { font-size: 1.2rem; font-weight: 700; white-space: pre-line; color: rgba(255, 255, 255, 0.9); margin-top: 2rem; text-shadow: 1px 1px 0 var(--color-black); text-align: center;}
        .btn-toggle { background: transparent; color: var(--color-white); border: 2px solid var(--color-white); padding: 0.5rem 2rem; font-size: 1.2rem; font-weight: 900; cursor: pointer; margin-top: 2rem; transition: 0.2s;}
        .btn-toggle:hover { background: var(--color-white); color: var(--color-black); }

        #intro-split { display: flex; flex-wrap: wrap; max-width: 100%; padding: 0; border-bottom: var(--border-thick); }
        .split-panel { flex: 1; min-width: 400px; padding: 5rem 3rem; background: var(--color-white); display: flex; flex-direction: column; }
        .split-panel:first-child { border-right: var(--border-thick); }
        .stats-number { font-size: 4.5rem; color: var(--color-red); font-family: var(--font-stencil); line-height: 1; }
        .founder-img { border: var(--border-thick); width: 100%; max-width: 250px; margin-bottom: 1.5rem; cursor: pointer; }
        .founder-links a { display: block; color: var(--color-red); text-decoration: underline; margin-bottom: 0.5rem; font-weight: 900; font-size: 0.9rem; }
        .community-img-wrap { margin-top: 2rem; border: var(--border-thick); overflow: hidden; cursor: pointer; }

        /* WORKS - 固定と最前面表示の修正 */
        #works-wrapper { 
            position: relative;
            background-color: var(--color-black); 
            padding: 12rem 0 8rem 0; /* 吹き出しのために上の余白を大きく確保 */
            color: var(--color-white); 
            overflow: hidden;
        }
        .works-bg-art {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.35;
            filter: grayscale(100%) brightness(40%);
        }
        #works-wrapper .section-title { position: relative; z-index: 10; color: var(--color-white); }
        #works-wrapper .section-title::after { background: var(--color-white); }
        
        .slider-container { position: relative; z-index: 20; display: flex; overflow-x: auto; gap: 3rem; padding: 2rem 2rem 5rem 2rem; scroll-behavior: smooth; }
        .slider-container::-webkit-scrollbar { display: none; }
        
        .work-item { 
            flex: 0 0 340px; 
            background: var(--color-white); 
            border: var(--border-thick); 
            color: var(--color-black); 
            padding: 2.5rem 2rem; 
            cursor: pointer; 
            transition: transform 0.3s ease; 
            position: relative; 
            font-size: 1.1rem; 
            text-align: center; 
            z-index: 30;
            display: block;
        }
        .work-item:hover { transform: translateY(-10px); z-index: 100; } /* ホバーしたカードを前面に */
        .work-item img { width:100%; height:180px; object-fit:cover; margin-bottom:1rem; border-bottom:2px solid var(--color-black); filter: grayscale(100%); transition: 0.3s;}
        .work-item:hover img { filter: grayscale(0%); }
        
        /* 🛠 吹き出しの最終修正版 */
        .work-tooltip {
            position: absolute; 
            bottom: 125%; /* 位置を高く */
            left: 50%; 
            transform: translateX(-50%) translateY(20px);
            background: rgba(0, 0, 0, 0.95); 
            color: var(--color-white); 
            padding: 1.5rem; 
            border: 3px solid var(--color-red);
            width: 320px; 
            font-size: 1rem; 
            font-weight: 900; 
            line-height: 1.6;
            opacity: 0; 
            visibility: hidden; 
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
            pointer-events: none; 
            z-index: 999; /* 確実に最前面 */
            box-shadow: 0 -15px 30px rgba(0,0,0,0.8);
            pointer-events: none;
        }
        .work-tooltip::after { 
            content: ''; 
            position: absolute; 
            top: 100%; 
            left: 50%; 
            margin-left: -12px; 
            border-width: 12px; 
            border-style: solid; 
            border-color: var(--color-red) transparent transparent transparent; 
        }
        
        .work-item:hover .work-tooltip { 
            opacity: 1; 
            visibility: visible; 
            transform: translateX(-50%) translateY(0); 
        }
